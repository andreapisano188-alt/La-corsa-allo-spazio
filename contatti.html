<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Il Mio Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">Andrea Pisano</div>
        <nav>
            <ul>
                <li><a href="index.html">Progetti</a></li>
                <li><a href="info.html">Info</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <section class="contact-content">
            
            <div class="contact-form">
                <h1>Lavoriamo insieme</h1>
                <p>Hai un progetto in mente? Compila il modulo qui sotto e ti risponderò al più presto.</p>
                
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Messaggio</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Invia Messaggio</button>
                </form>
            </div>

            <div class="contact-info">
                <h3>Dettagli</h3>
                <p>andrea.pisano188@gmail.com</p>
                
                
                <h3>Social</h3>
                <ul class="social-links">
                    <li><a href="#">Instagram</a></li>
                    <li><a href="#">LinkedIn</a></li>
                </ul>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 di Andrea Pisano.</p>
    </footer>

</body>
</html>
