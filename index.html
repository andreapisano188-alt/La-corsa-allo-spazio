    <div class="project-item">
        <a href="Saturn V Rocket , Tomasz Cygan.jpeg" data-lightbox="roadtrip" data-title="<strong>Progetto: Apollo</strong><br><em></em><br>Il Saturn V è stato uno dei razzi più potenti e iconici mai costruiti, fondamentale per il successo del programma Apollo della NASA che portò l'uomo sulla Luna tra il 1969 e il 1972. 
Sviluppato sotto la direzione di Wernher von Braun presso il Marshall Space Flight Center, il Saturn V è stato progettato specificamente per lanciare carichi utili pesanti verso la Luna.

Alto 110-111 metri (superiore a un edificio di 30 piani), al decollo pesava circa 3.000 tonnellate. Generava una spinta iniziale di oltre 34 milioni di Newton.

Struttura a Tre Stadi: Era un razzo multistadio a propellente liquido:

Primo Stadio (S-IC): Bruciava 13 tonnellate di propellente al secondo, sollevando il razzo fino a 60 km di altezza.

Secondo Stadio (S-II): Portava il veicolo a 185 km di altezza.

Terzo Stadio (S-IVB): Inseriva l'equipaggio nell'orbita terrestre e successivamente spingeva verso la Luna.

Ad oggi, rimane l'unico razzo ad aver trasportato esseri umani oltre l'orbita terrestre bassa.

Oltre alle missioni lunari Apollo, una versione a due stadi è stata usata nel 1973 per lanciare la stazione spaziale Skylab. Non era riutilizzabile.">
            <img src="Saturn V Rocket , Tomasz Cygan.jpeg" alt="Saturn V">
            <div class="overlay"><span>Saturn V</span></div>

    </div>



    <div class="project-item">
        <a href="Costruzione.jpeg" data-lightbox="roadtrip" data-title="<strong>Progetto: Luna</strong><br><em></em><br>Il Sojuz (in russo Unione) è uno dei vettori spaziali più iconici, affidabili e longevi della storia dell'esplorazione spaziale.
Deriva dal missile balistico intercontinentale R-7 Semjorka (progettato da Sergei Korolev), il primo ICBM al mondo. Il razzo è in uso dal 1966, con diverse evoluzioni (attualmente la serie 2.1a/2.1b), rappresentando la famiglia di lanciatori più utilizzata al mondo con oltre 1700 voli.
Funzione: Viene utilizzato sia per il trasporto di equipaggi (capsula Sojuz) che per il lancio di navette cargo robotiche (Progress) verso la Stazione Spaziale Internazionale (ISS).
Affidabilità: Nonostante l'età del design, l'avionica e l'elettronica sono state costantemente aggiornate. È considerato uno dei sistemi più solidi mai costruiti.
Caratteristiche tecniche: È un razzo a tre stadi, solitamente lanciato dal Cosmodromo di Bajkonur (Kazakistan) e da Pleseck (Russia).
Curiosità: Il caratteristico distacco dei booster laterali durante il lancio, che formano una sorta di croce, è noto nel settore come la Croce di Korolev. Dal 2011 al 2020, dopo il ritiro degli Space Shuttle, la Sojuz è stata l'unico mezzo di trasporto per gli astronauti verso la ISS. ">
            <img src="Costruzione.jpeg" alt="Sojuz">

    <div class="project-item">
        <a href="shut.jpeg" data-lightbox="roadtrip" data-title="<strong>Progetto: Shuttle</strong><br><em></em><br> Il programma Space Shuttle (ufficialmente Space Transportation System - STS) è stato un pilastro dell'esplorazione spaziale statunitense, operativo dal 1981 al 2011. È stato il primo sistema di lancio con equipaggio parzialmente riutilizzabile, progettato per portare carichi utili e astronauti in orbita terrestre bassa. 
A differenza dei razzi tradizionali, lo Shuttle decollava verticalmente e atterrava su una pista come un aliante, permettendo di riutilizzare l'orbiter per missioni successive.
È stato fondamentale per la costruzione della Stazione Spaziale Internazionale (ISS), il lancio di satelliti (come l'Hubble Space Telescope) e la ricerca scientifica.
Cinque orbiter principali hanno operato nella storia: Columbia, Challenger, Discovery, Atlantis ed Endeavour.
Nonostante il successo tecnologico, il programma ha avuto una storia travagliata con due tragici incidenti (Challenger nel 1986 e Columbia nel 2003).
L'ultima missione, STS-135, si è conclusa il 21 luglio 2011, chiudendo un'era durata 30 anni.
Lo Shuttle ha ridefinito il concetto di trasporto spaziale, funzionando come una vera spola tra la Terra e lo spazio.">
   
<img src="shut.jpeg" alt="Space Shuttle">
    <div class="overlay"><span>Space Shuttle</span></div>
        </a>
    </div>




    <div class="project-item">
        <a href="marcury.jpeg" data-lightbox="roadtrip" data-title="<strong>Progetto: Marcury Atlas</strong><br><em></em><br> Il Mercury Atlas è stato un elemento fondamentale del primissimo programma spaziale statunitense (Programma Mercury), attivo tra il 1958 e il 1963. Si trattava della combinazione tra la capsula Mercury e il lanciatore Atlas, utilizzata per le missioni orbitali con equipaggio. 
Lanciare un astronauta americano in orbita attorno alla Terra, studiando la reazione del corpo umano nello spazio.
L'Atlas era una famiglia di missili utilizzati come veicoli di lancio spaziale, cruciali per portare la capsula in orbita.
Il 20 febbraio 1962, il Mercury Atlas 6 portò John Glenn a diventare il primo statunitense a entrare in orbita attorno alla Terra, compiendo tre giri del pianeta.
Il programma ha fatto da trampolino di lancio per la corsa verso la Luna, sancendo l'inizio dell'esplorazione umana dello spazio da parte della NASA. 
In sintesi, il Mercury Atlas è il sistema che ha permesso agli USA di pareggiare i conti con l'Unione Sovietica nella fase iniziale della corsa allo spazio. ">
    <img src="marcury.jpeg" alt="Mercury Atlas">

    <div class="project-item">
        <a href="titan 2.jpg" data-lightbox="roadtrip" data-title="<strong>Progetto: Titan II GLV</strong><br><em></em><br> Il Titan II GLV (Gemini Launch Vehicle) è stato un razzo vettore statunitense. Questo razzo è stato cruciale per il programma Gemini della NASA negli anni '60.
Sviluppato per lanciare le capsule Gemini con equipaggio umano. Ha effettuato 12 missioni tra il 1964 e il 1966, di cui 10 con astronauti.
Era una versione modificata del missile balistico intercontinentale (ICBM) Titan II SM-68B.
Tutti i 12 lanci dal Launch Complex 19 di Cape Canaveral hanno avuto successo.
Era un razzo a due stadi a propellente liquido, alto circa 33 metri. Utilizzava propellenti ipergolici (Aerozine 50 e tetrossido di azoto).
È stato fondamentale per testare le capacità umane e tecniche necessarie per le successive missioni lunari Apollo, inclusi i primi EVA (attività extraveicolari) americani. 
In sintesi, il Titan II GLV ha permesso alla NASA di passare dal programma Mercury al programma Apollo.">
